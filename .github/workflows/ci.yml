name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create stub .env for tests
        run: |
          echo "SUPABASE_URL=https://stub.supabase.co" >> .env
          echo "SUPABASE_ANON_KEY=stub-anon-key" >> .env
          echo "SUPABASE_REDIRECT_URL=com.example.eda://login-callback/" >> .env

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test --reporter=compact
