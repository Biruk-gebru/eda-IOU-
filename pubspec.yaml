name: eda
description: "IoU - Track who owes whom with approvals and payments"
publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  forui: ^0.20.2
  fl_chart: ^0.70.2

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Backend
  supabase_flutter: ^2.8.0

  # Storage
  flutter_secure_storage: ^9.2.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

  # Configuration
  flutter_dotenv: ^5.2.1

  # Notifications
  flutter_local_notifications: ^18.0.0

  # Offline & Connectivity
  connectivity_plus: ^6.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/logo.png
    - assets/telebirrlogo.png
    - assets/cbelogo.png
    - assets/zemenlogo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F5F0E8"
  adaptive_icon_foreground: "assets/logo.png"
